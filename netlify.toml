[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  included_files = ["public/archive-data.json"]

[[redirects]]
  from = "/api/archive-search"
  to = "/.netlify/functions/archive-search"
  status = 200
